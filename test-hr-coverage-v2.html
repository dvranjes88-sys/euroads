// ── TIMEOUT WRAPPER — KĽÚČOVÉ pre robustnosť ──
function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error(`Timeout ${ms}ms: ${label || ''}`)), ms)
    ),
  ]);
}

// ── HELPERS ──
function nearestHACStation(lat, lng) {
  let best = null, bestDist = Infinity;
  for (const [name, slat, slng] of HAC_STATION_GPS) {
    const d = Math.sqrt((lat - slat) ** 2 + (lng - slng) ** 2);
    if (d < bestDist) { bestDist = d; best = name; }
  }
  return { name: best, dist: bestDist };
}

function makeStationVariants(name) {
  if (!name) return [];
  const v = new Set([name]);
  v.add(name.replace(/\s+(Istok|Zapad|Sjever|Jug)$/i, m => m.toLowerCase()));
  v.add(name.replace(/\s+/, '-'));
  const paren = name.match(/^(.+?)\s*\([^)]+\)$/);
  if (paren) v.add(paren[1].trim());
  if (paren) v.add(paren[0].match(/\(([^)]+)\)/)[1]);
  v.add(name.normalize('NFD').replace(/[\u0300-\u036f]/g, ''));
  return [...v].filter(Boolean);
}

// HAC API call s timeoutom 3s per variant, max 4 variants tried
async function fetchHACToll(entry, exit, vehicleCat) {
  const cat = vehicleCat || 'I';
  if (!entry || !exit || entry === exit) return null;
  const entryVars = makeStationVariants(entry).slice(0, 2); // max 2 entry variants
  const exitVars = makeStationVariants(exit).slice(0, 2);   // max 2 exit variants

  for (const e of entryVars) {
    for (const x of exitVars) {
      if (e === x) continue;
      const url = `https://cro3-tmp.hac.hr/tollcalculator/price/${encodeURIComponent(e)}/${encodeURIComponent(x)}`;
      try {
        const r = await withTimeout(fetch(url), 3000, `HAC ${e}→${x}`);
        if (!r.ok) continue;
        const data = await r.json();
        if (!data.Segments?.length) continue;
        let total = 0;
        const segments = [];
        for (const seg of data.Segments) {
          const price = seg.Prices?.find(p => p.Category === cat) || seg.Prices?.find(p => p.Category === 'I');
          if (price) {
            total += price.Amount;
            segments.push({ entry: seg.EntryName, exit: seg.ExitName, amount: price.Amount });
          }
        }
        if (total > 0) return { total, segments, entryUsed: e, exitUsed: x };
      } catch (err) { /* try next variant */ }
    }
  }
  return null;
}

// ── PRODUCTION-LIKE calcHRToll (same logic as index.html after fixes) ──
async function calcHRToll(entryStation, exitStation, lastHRLat) {
  const cat = 'I';

  // Build entry candidates
  const entryCandidates = entryStation ? [entryStation] : [];

  // Build exit candidates with Dubrovnik fix
  const exitCandidates = exitStation ? [exitStation] : [];

  if (lastHRLat !== null && lastHRLat < 43.5) {
    // Southern destinations — add A1 southern endpoints
    const southernEndpoints = ['Karamatići', 'Ravča', 'Vrgorac', 'Zagvozd', 'Šestanovac'];
    for (const ep of southernEndpoints) {
      if (!exitCandidates.includes(ep)) exitCandidates.push(ep);
    }
    // For Dubrovnik area, deprioritize Karasovići
    if (lastHRLat < 43.0) {
      const idx = exitCandidates.indexOf('Karasovići');
      if (idx >= 0) {
        exitCandidates.splice(idx, 1);
        exitCandidates.push('Karasovići');
      }
    }
  }

  // Try all combinations
  for (const entry of entryCandidates) {
    for (const exit of exitCandidates) {
      if (entry === exit) continue;
      const result = await fetchHACToll(entry, exit, cat);
      if (result?.total > 0) {
        return { ...result, entryUsed: entry, exitUsed: exit, finalEntry: entry, finalExit: exit };
      }
    }
  }
  return null;
}

// ── GOOGLE MAPS LAZY LOADER ──
let _googleLoadPromise = null;
function loadGoogleMapsSDK() {
  if (_googleLoadPromise) return _googleLoadPromise;
  if (window.google?.maps?.DirectionsService) {
    _googleLoadPromise = Promise.resolve();
    return _googleLoadPromise;
  }
  _googleLoadPromise = new Promise((resolve, reject) => {
    const cbName = '_googleMapsReady_' + Date.now();
    window[cbName] = () => { delete window[cbName]; resolve(); };
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_KEY}&libraries=places&callback=${cbName}&v=weekly&loading=async`;
    script.async = true;
    script.defer = true;
    script.onerror = () => { delete window[cbName]; reject(new Error('Google Maps SDK failed')); };
    document.head.appendChild(script);
  });
  return _googleLoadPromise;
}

// Mapbox geocode s timeoutom 2s
async function getCountryAt(lat, lng) {
  try {
    const r = await withTimeout(
      fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?access_token=${MAPBOX_TOKEN}&types=country&limit=1`),
      2000, 'mapbox geocode'
    );
    const d = await r.json();
    return d.features?.[0]?.properties?.short_code?.toUpperCase() || null;
  } catch (e) { return null; }
}

// ── RUN ONE TEST (s parallelizmom + timeoutmi) ──
async function runOneTest(t, idx) {
  if (cancelFlag) return null;
  const row = document.getElementById(`row-${idx}`);
  row.cells[7].innerHTML = '<span class="status-pending">⏳ Routing…</span>';

  try {
    // 1. Google Directions s timeoutom 8s
    const service = new google.maps.DirectionsService();
    const result = await withTimeout(
      service.route({
        origin: { lat: t.origin.lat, lng: t.origin.lng },
        destination: { lat: t.dest.lat, lng: t.dest.lng },
        travelMode: google.maps.TravelMode.DRIVING,
      }),
      8000, 'google directions'
    );

    if (!result.routes?.[0]) throw new Error('No route');
    const route = result.routes[0];
    const totalKm = route.legs.reduce((sum, l) => sum + l.distance.value, 0) / 1000;

    // 2. Sample 10 bodov pozdĺž trasy (znížené z 20 pre rýchlosť)
    const path = route.overview_path;
    const samples = [];
    const numSamples = 10;
    const step = Math.max(1, Math.floor(path.length / numSamples));
    for (let i = 0; i < path.length; i += step) {
      samples.push({ lat: path[i].lat(), lng: path[i].lng() });
    }
    if (samples[samples.length - 1] !== path[path.length - 1]) {
      samples.push({ lat: path[path.length - 1].lat(), lng: path[path.length - 1].lng() });
    }

    row.cells[7].innerHTML = '<span class="status-pending">⏳ Geocoding…</span>';

    // 3. Country detection paralelne s timeoutom — Promise.all so withTimeout
    const countries = await withTimeout(
      Promise.all(samples.map(s => getCountryAt(s.lat, s.lng))),
      8000, 'parallel geocode'
    );

    // 4. Find border BEFORE entering HR
    const firstHRIdx = countries.findIndex(c => c === 'HR');
    let borderCC = null;
    if (firstHRIdx > 0) borderCC = countries[firstHRIdx - 1];
    else if (firstHRIdx === 0) borderCC = t.origin.country;

    const hrPoints = samples.filter((_, i) => countries[i] === 'HR');
    const lastHRIdx = countries.lastIndexOf('HR');

    let entryStation = HAC_BORDER_ENTRY[borderCC] || null;
    let exitStation = null;

    if (hrPoints.length > 0) {
      const lastHR = samples[lastHRIdx];
      const nearest = nearestHACStation(lastHR.lat, lastHR.lng);
      if (nearest.dist < 0.8) exitStation = nearest.name;
    }

    if (!entryStation && hrPoints.length > 0) {
      const firstHR = samples[firstHRIdx];
      const nearest = nearestHACStation(firstHR.lat, firstHR.lng);
      if (nearest.dist < 0.8) entryStation = nearest.name;
    }

    row.cells[7].innerHTML = '<span class="status-pending">⏳ HAC API…</span>';

    // 5. HAC API — wrap celé volanie ďalším timeoutom (15s max)
    let toll = null;
    let status, statusClass, notes = '';
    if (entryStation && exitStation) {
      const lastHRLat = hrPoints.length > 0 ? samples[lastHRIdx].lat : null;
      try {
        toll = await withTimeout(
          calcHRToll(entryStation, exitStation, lastHRLat),
          15000, 'HAC overall'
        );
        if (toll) {
          status = '✅ Live HAC';
          statusClass = 'status-ok';
          const usedDifferent = toll.finalEntry !== entryStation || toll.finalExit !== exitStation;
          notes = usedDifferent
            ? `Resolved: ${toll.finalEntry} → ${toll.finalExit}`
            : '';
        } else {
          status = '⚠️ HAC no match';
          statusClass = 'status-warn';
          notes = `Tried ${entryStation} → ${exitStation} + fallbacks`;
        }
      } catch (err) {
        status = '⚠️ HAC timeout';
        statusClass = 'status-warn';
        notes = err.message.substring(0, 50);
      }
    } else {
      status = '⚠️ No stations';
      statusClass = 'status-warn';
      notes = `Border: ${borderCC || '?'}, HR pts: ${hrPoints.length}`;
    }

    // 6. Update row
    row.cells[2].textContent = totalKm.toFixed(0);
    row.cells[3].innerHTML = borderCC ? `<span class="kbd">${borderCC}</span>` : '<span class="muted">?</span>';
    row.cells[4].textContent = entryStation || '—';
    row.cells[5].textContent = exitStation || '—';
    row.cells[6].innerHTML = toll ? `<strong>€${toll.total.toFixed(2)}</strong>` : '<span class="muted">—</span>';
    row.cells[7].innerHTML = `<span class="${statusClass}">${status}</span>`;
    row.cells[8].innerHTML = notes ? `<span class="muted">${notes}</span>` : '';

    return { ...t, totalKm, borderCC, entryStation, exitStation, toll: toll?.total || null, status, notes };

  } catch (err) {
    row.cells[7].innerHTML = `<span class="status-fail">❌ Error</span>`;
    row.cells[8].innerHTML = `<span class="status-fail">${err.message.substring(0, 60)}</span>`;
    return { ...t, error: err.message, status: '❌ Error' };
  }
}

// ── MAIN: run all tests in PARALLEL BATCHES of 5 ──
async function runAllTests() {
  cancelFlag = false;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('runBtn').textContent = 'Running…';
  document.getElementById('cancelBtn').style.display = 'inline-block';
  document.getElementById('exportBtn').disabled = true;
  document.getElementById('summary').style.display = 'none';
  buildTestList();
  renderEmptyTable();

  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('statTime').textContent = `${elapsed}s`;
  }, 200);

  document.getElementById('status').textContent = 'Loading Google Maps SDK…';
  await loadGoogleMapsSDK();
  document.getElementById('status').textContent = 'Running 50 tests in batches of 5…';

  allResults = new Array(allTests.length);
  const BATCH_SIZE = 5;
  let completed = 0;

  for (let batchStart = 0; batchStart < allTests.length; batchStart += BATCH_SIZE) {
    if (cancelFlag) break;
    const batch = allTests.slice(batchStart, batchStart + BATCH_SIZE);
    const indices = batch.map((_, i) => batchStart + i);

    document.getElementById('status').textContent =
      `Batch ${Math.floor(batchStart / BATCH_SIZE) + 1}/${Math.ceil(allTests.length / BATCH_SIZE)} (tests ${batchStart + 1}-${Math.min(batchStart + BATCH_SIZE, allTests.length)})…`;

    // Run batch in parallel
    const batchResults = await Promise.all(
      batch.map((t, i) => runOneTest(t, indices[i]))
    );

    // Store results
    batchResults.forEach((r, i) => {
      if (r) allResults[indices[i]] = r;
    });

    completed += batch.length;
    document.getElementById('progressBar').style.width = `${(completed / allTests.length) * 100}%`;
    updateStats();

    // Small breather between batches (avoid rate limiting)
    if (batchStart + BATCH_SIZE < allTests.length) {
      await new Promise(r => setTimeout(r, 300));
    }
  }

  clearInterval(timerInterval);
  const totalSec = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('runBtn').disabled = false;
  document.getElementById('runBtn').textContent = '▶ Re-run all 50 tests';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('exportBtn').disabled = false;
  document.getElementById('status').textContent = cancelFlag
    ? `Cancelled after ${totalSec}s`
    : `✓ Done in ${totalSec}s — ${allResults.filter(Boolean).length} tests`;
  showSummary();
}

function cancelTests() {
  cancelFlag = true;
  document.getElementById('cancelBtn').textContent = '⏹ Cancelling…';
}

function updateStats() {
  const valid = allResults.filter(Boolean);
  const total = valid.length;
  const live = valid.filter(r => r.status === '✅ Live HAC').length;
  const fallback = valid.filter(r => r.status?.startsWith('⚠️')).length;
  const failed = valid.filter(r => r.status === '❌ Error').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statLive').textContent = live;
  document.getElementById('statFallback').textContent = fallback;
  document.getElementById('statFailed').textContent = failed;
}

function showSummary() {
  const valid = allResults.filter(Boolean);
  const live = valid.filter(r => r.status === '✅ Live HAC').length;
  const fallback = valid.filter(r => r.status?.startsWith('⚠️'));
  const failed = valid.filter(r => r.status === '❌ Error');
  const summary = document.getElementById('summary');

  let html = `<h3>📊 Coverage Report</h3>`;
  html += `<strong>${live}/${valid.length}</strong> routes have Live HAC (<strong>${(live / valid.length * 100).toFixed(0)}%</strong>).<br>`;

  if (fallback.length) {
    html += `<br><strong>⚠️ ${fallback.length} routes used fallback:</strong>`;
    const grouped = {};
    fallback.forEach(r => {
      const key = `${r.borderCC || '?'} entry / ${r.entryStation || 'no station'} → ${r.exitStation || 'no exit'}`;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(r.label);
    });
    for (const [key, routes] of Object.entries(grouped)) {
      html += `<div class="group"><span class="kbd">${key}</span>: ${routes.join(', ')}</div>`;
    }
    summary.classList.add('has-issues');
  }

  if (failed.length) {
    html += `<br><strong>❌ ${failed.length} routes failed:</strong>`;
    failed.forEach(r => {
      html += `<div class="group">${r.label} — ${(r.error || r.status).substring(0, 80)}</div>`;
    });
  }

  if (live === valid.length && valid.length > 0) {
    html = `<h3>🎉 Perfect Coverage!</h3>All <strong>${valid.length}</strong> routes have Live HAC pricing. HR is 100% solid.`;
    summary.classList.remove('has-issues');
  }

  summary.innerHTML = html;
  summary.style.display = 'block';
}

function exportCsv() {
  const valid = allResults.filter(Boolean);
  if (!valid.length) return;
  const headers = ['Origin', 'Origin Country', 'Destination', 'Total km', 'Border in', 'HAC Entry', 'HAC Exit', 'Toll EUR', 'Status', 'Notes'];
  const rows = valid.map(r => [
    r.origin.name, r.origin.country, r.dest.name,
    r.totalKm?.toFixed(0) || '', r.borderCC || '',
    r.entryStation || '', r.exitStation || '',
    r.toll?.toFixed(2) || '',
    r.status || '', r.notes || r.error || ''
  ]);
  const csv = [headers, ...rows].map(row =>
    row.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')
  ).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hr-coverage-test-v2-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

buildTestList();
renderEmptyTable();
</script>
